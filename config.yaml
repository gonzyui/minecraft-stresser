attack:
  protocol: "tcp"
  method: "connect"
  duration: 30
  threads: 100
  packet_size: 1024
  rate_delay: 0.01

target:
  ip: "127.0.0.1"
  port: 25565

logging:
  enabled: true
  file: "stresser.log"
  level: "INFO"

limits:
  max_threads: 1000
  max_duration: 300
  max_packet_size: 65500
  min_threads: 1
  min_duration: 1
  min_packet_size: 1